name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG And ZIP
        run: |
          chmod +x ./scripts/make_app.sh ./scripts/make_dmg.sh
          ./scripts/make_app.sh
          mkdir -p dist/.ci-dmg-staging
          cp -R dist/NCMDockConverter.app dist/.ci-dmg-staging/NCMDockConverter.app
          ln -s /Applications dist/.ci-dmg-staging/Applications
          hdiutil create \
            -volname "NCMDockConverter" \
            -srcfolder dist/.ci-dmg-staging \
            -fs HFS+ \
            -format UDZO \
            -imagekey zlib-level=9 \
            -ov \
            dist/NCMDockConverter-unsigned.dmg
          rm -rf dist/.ci-dmg-staging

      - name: Collect Artifacts
        run: |
          mkdir -p release
          cp -f dist/NCMDockConverter-unsigned.zip release/ || true
          cp -f dist/NCMDockConverter-unsigned.dmg release/ || true
          ls -la release

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NCMDockConverter-release
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/NCMDockConverter-unsigned.zip
            release/NCMDockConverter-unsigned.dmg
          generate_release_notes: true
